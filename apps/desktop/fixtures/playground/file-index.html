<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script src="./.hubble/node_modules/@hubble.md/runtime/global.js"></script>
		<script src="./.hubble/node_modules/@tailwindcss/browser/dist/index.global.js"></script>
		<script src="./.hubble/node_modules/alpinejs/dist/cdn.min.js" defer></script>
	</head>
	<body class="m-0 overflow-hidden px-6 py-6 font-sans text-slate-800">
		<div
			class="rounded-lg border border-emerald-200 bg-emerald-50/70 px-5 py-5"
			x-data="{
				files: [],
				sort: 'recent',
				error: '',
				async init() {
					try {
						this.files = await hubble.files.list('**/*.md')
					} catch (error) {
						this.error = error.message
					}
				},
				get sortedFiles() {
					return [...this.files].sort((a, b) => {
						if (this.sort === 'name') {
							return a.path.toLowerCase().localeCompare(b.path.toLowerCase())
						}
						return b.modified_at - a.modified_at || a.path.localeCompare(b.path)
					})
				},
				date(timestamp) {
					return new Date(timestamp * 1000).toLocaleString()
				}
			}"
		>
			<div class="mb-4 flex items-center justify-between gap-3">
				<h1 class="m-0 text-2xl leading-tight font-bold">Workspace files</h1>
				<div class="flex gap-2" aria-label="Sort files">
					<button
						class="cursor-pointer rounded-lg border border-emerald-300 bg-white px-3 py-2 text-slate-800 aria-pressed:border-emerald-950 aria-pressed:bg-emerald-950 aria-pressed:text-white"
						type="button"
						:aria-pressed="sort === 'recent'"
						@click="sort = 'recent'"
					>
						Recent
					</button>
					<button
						class="cursor-pointer rounded-lg border border-emerald-300 bg-white px-3 py-2 text-slate-800 aria-pressed:border-emerald-950 aria-pressed:bg-emerald-950 aria-pressed:text-white"
						type="button"
						:aria-pressed="sort === 'name'"
						@click="sort = 'name'"
					>
						Name
					</button>
				</div>
			</div>

			<p class="m-0 text-slate-500" x-show="!error && files.length === 0">
				Loading files...
			</p>
			<p class="m-0 text-slate-500" x-show="error" x-text="error"></p>

			<ul class="m-0 grid list-none gap-2 p-0" x-show="!error && files.length > 0">
				<template x-for="file in sortedFiles" :key="file.path">
					<li class="grid gap-1 rounded-lg border border-emerald-100 bg-white px-3.5 py-3">
						<span class="text-[15px] font-bold" x-text="file.path"></span>
						<span
							class="text-[13px] text-slate-500"
							x-text="`${date(file.modified_at)} · ${file.size} bytes`"
						></span>
					</li>
				</template>
			</ul>
		</div>
	</body>
</html>
