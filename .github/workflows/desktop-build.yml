name: Desktop Build (Windows)

# Builds an unsigned Windows desktop app on every push to a development branch
# (and on demand) so a ready-to-run .exe is always available as a workflow
# artifact — no tag or release required.

on:
  push:
    branches:
      - "claude/**"
      - main
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/desktop-build.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - "packages/**"
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows desktop app
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundle
        run: pnpm --filter "@hubble.md/desktop..." --if-present build

      - name: Package Windows app (unsigned)
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm --filter @hubble.md/desktop exec electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hubble-windows
          if-no-files-found: error
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest.yml
